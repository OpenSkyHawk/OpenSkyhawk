[env:E2E_PanelGroup]
platform = ststm32
; STM32F103C8 (64 KB) — current bench hardware. NOTE: this E2E node accumulates every control class
; (U8g2 alone is ~15 KB of flash), so flash tightens as it grows — currently ~72%. Move to
; genericSTM32F103CB (128 KB) when one is on hand if it runs out of room.
board = genericSTM32F103C8
framework = arduino
board_build.f_cpu = 72000000L

; NODE_ID must be set here — not in src/main.cpp.
; A #define in main.cpp is invisible to library translation units (CANProtocol, PanelGroup).
; Valid range: 1–63. Each board in the cockpit must have a unique value.
build_flags =
    -DNODE_ID=1
    -DHAL_CAN_MODULE_ENABLED
    -DUSB_NONE
    -DHSE_VALUE=8000000
    -DI2C_TIMEOUT_TICK=10

; -DHSE_VALUE=8000000: explicit 8 MHz external crystal — required for reliable CAN bit-rate
; lock. Internal RC oscillator is not accurate enough for 500 kbps CAN timing.
; -DI2C_TIMEOUT_TICK=10: bound every I2C transaction to ~10 ms (STM32 core default is 100 ms) so a
; stuck/floating bus can't stall the loop — completes the I2cHealth circuit breaker (#164). Healthy
; OLED/MCP/ADS chunks are well under 10 ms; a dead device is skipped by the breaker, not transacted.
; Convention: any PanelGroup node with I2C devices should set this.

lib_extra_dirs = ${PROJECT_DIR}/../../../Libraries
lib_deps =
    HIDControls
    STM32Board
    PanelGroup
    DrumDisplay
    CANProtocol
    A4EC
    blemasle/MCP23017@^2.0.0
    adafruit/Adafruit ADS1X15@^2.0.0
    olikraus/U8g2@^2.35

upload_protocol = stlink
; Some STM32F103C8 (Blue Pill) clones require the CPUTAPID override below.
; Uncomment if ST-Link reports "tap not found" during flashing:
; upload_flags =
;     -c
;     set CPUTAPID 0x2ba01477
monitor_speed = 115200
; monitor_port = /dev/cu.usbserial-XXXX   ; set to your USB-serial adapter port
