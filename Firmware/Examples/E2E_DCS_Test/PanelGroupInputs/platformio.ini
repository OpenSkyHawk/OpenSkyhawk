; E2E_DCS_Test PanelGroup — INPUTS-ONLY variant (NODE 1).
; Strips the OLED drums + stepper + LED of ../PanelGroup so the loop stays fast when only the inputs
; are wired — the full node's per-loop I2C to absent OLEDs stalls the loop and flaps the node
; online/offline on the bridge. Genuine STM32F103C8 here (no CPUTAPID override — that's bridge-only).
; Flash:  pio run -d Firmware/Examples/E2E_DCS_Test/PanelGroupInputs -t upload

[env:E2E_PanelGroup_Inputs]
platform = ststm32
board = genericSTM32F103C8
framework = arduino
board_build.f_cpu = 72000000L

build_flags =
    -DNODE_ID=1
    -DHAL_CAN_MODULE_ENABLED
    -DUSB_NONE
    -DHSE_VALUE=8000000

lib_extra_dirs = ${PROJECT_DIR}/../../../Libraries
lib_deps =
    HIDControls
    STM32Board
    PanelGroup
    CANProtocol
    A4EC
    blemasle/MCP23017@^2.0.0
    adafruit/Adafruit ADS1X15@^2.0.0

upload_protocol = stlink
monitor_speed = 115200
