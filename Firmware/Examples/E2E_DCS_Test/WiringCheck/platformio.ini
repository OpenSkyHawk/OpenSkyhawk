; E2E_DCS_Test input wiring check — standalone raw-read diagnostic.
; No CAN, no DCS, no OLED, no stepper, no OpenSkyhawk libs — just GPIO/ADC + USART1.
; Flash:  pio run -d Firmware/Examples/E2E_DCS_Test/WiringCheck -t upload
; Watch:  USART1 (PA9 TX / PA10 RX) @ 115200 — the same diag adapter the full bench uses.

[env:wiring_check]
platform = ststm32
board = genericSTM32F103C8
framework = arduino
board_build.f_cpu = 72000000L

; 8 MHz external crystal (not needed for logic here, but matches the board so millis()/baud are exact).
build_flags =
    -DHSE_VALUE=8000000

upload_protocol = stlink
; Uncomment if an ST-Link clone reports "tap not found":
; upload_flags =
;     -c
;     set CPUTAPID 0x2ba01477
monitor_speed = 115200
; monitor_port = /dev/cu.usbserial-XXXX   ; set to your USB-serial adapter port
