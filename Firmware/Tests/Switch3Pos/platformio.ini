[platformio]
src_dir = tests

[env_base]
platform = ststm32
board = genericSTM32F103C8
framework = arduino
build_flags =
    -DNODE_ID=1
    -DHAL_CAN_MODULE_ENABLED
    -DMULTIPOS_TEST
upload_protocol = stlink
upload_flags =
    -c
    set CPUTAPID 0
monitor_speed = 115200
lib_deps =
    file://../../Libraries/PanelGroup
    file://../../Libraries/CANProtocol
    file://../../Libraries/STM32Board
    file://../../Libraries/HIDControls
    blemasle/MCP23017@^2.0.0
    adafruit/Adafruit ADS1X15@^2.0.0

[env:test_positions]
extends = env_base
build_src_filter = -<*> +<positions/positions.cpp>

[env:test_both_active]
extends = env_base
build_src_filter = -<*> +<both_active/both_active.cpp>

[env:test_debounce]
extends = env_base
build_src_filter = -<*> +<debounce/debounce.cpp>

[env:test_no_duplicate]
extends = env_base
build_src_filter = -<*> +<no_duplicate/no_duplicate.cpp>

[env:test_reverse]
extends = env_base
build_src_filter = -<*> +<reverse/reverse.cpp>

[env:test_force_report]
extends = env_base
build_src_filter = -<*> +<force_report/force_report.cpp>
