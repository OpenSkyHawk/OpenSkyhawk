[platformio]
src_dir = tests

[env_base]
platform = ststm32
board = genericSTM32F103C8
framework = arduino
build_flags =
    -DNODE_ID=1
    -DHAL_CAN_MODULE_ENABLED
    -DNEEDLEGAUGE_TEST
    -DSTEPPERMOTOR_TEST
upload_protocol = stlink
upload_flags =
    -c
    set CPUTAPID 0
monitor_speed = 115200
lib_deps =
    file://../../Libraries/PanelGroup
    file://../../Libraries/CANProtocol
    file://../../Libraries/STM32Board
    file://../../Libraries/HIDControls
    file://../../Libraries/A4EC
    blemasle/MCP23017@^2.0.0
    adafruit/Adafruit ADS1X15@^2.0.0

[env:value_map]
extends = env_base
build_src_filter = -<*> +<value_map/value_map.cpp>

[env:calibration]
extends = env_base
build_src_filter = -<*> +<calibration/calibration.cpp>

[env:drift]
extends = env_base
build_src_filter = -<*> +<drift/drift.cpp>

; ── on-hardware DRIFT motion sim (bench, drives a real motor) ────────────────────
[env:drift_sim]
extends = env_base
build_src_filter = -<*> +<drift_sim/drift_sim.cpp>
