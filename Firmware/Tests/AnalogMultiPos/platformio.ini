[platformio]
src_dir = tests

[env_base]
platform = ststm32
board = genericSTM32F103C8
framework = arduino
build_flags =
    -DNODE_ID=1
    -DHAL_CAN_MODULE_ENABLED
    -DMULTIPOS_TEST
    -DANALOGMULTIPOS_TEST
upload_protocol = stlink
upload_flags =
    -c
    set CPUTAPID 0
monitor_speed = 115200
lib_deps =
    file://../../Libraries/PanelGroup
    file://../../Libraries/CANProtocol
    file://../../Libraries/STM32Board
    file://../../Libraries/HIDControls
    blemasle/MCP23017@^2.0.0
    adafruit/Adafruit ADS1X15@^2.0.0

[env:test_resolve]
extends = env_base
build_src_filter = -<*> +<resolve/resolve.cpp>

[env:test_analog_nc]
extends = env_base
build_src_filter = -<*> +<analog_nc/analog_nc.cpp>

[env:test_equal_spacing]
extends = env_base
build_src_filter = -<*> +<equal_spacing/equal_spacing.cpp>

[env:test_force_report]
extends = env_base
build_src_filter = -<*> +<force_report/force_report.cpp>

[env:test_change_emit]
extends = env_base
build_src_filter = -<*> +<change_emit/change_emit.cpp>
