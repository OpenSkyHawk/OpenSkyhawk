[platformio]
src_dir = tests

[env_base]
platform = raspberrypi
board = rpipico
framework = arduino
build_flags =
    -DSIMGATEWAY_TEST
lib_extra_dirs = ${PROJECT_DIR}/../../Libraries
lib_deps =
    SimGateway
    HIDControls
    earlephilhower/arduino-pico
    multigamesystem/MGS-Pico-Joystick

[env:test_hid_parser]
extends = env_base
build_src_filter = -<*> +<hid_parser/hid_parser.cpp>

[env:test_parser_resync]
extends = env_base
build_src_filter = -<*> +<parser_resync/parser_resync.cpp>

[env:test_hid_dispatch]
extends = env_base
build_src_filter = -<*> +<hid_dispatch/hid_dispatch.cpp>
