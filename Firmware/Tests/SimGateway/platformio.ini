[platformio]
src_dir = tests

[env_base]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico
board_build.core = earlephilhower
framework = arduino
build_flags =
    -DSIMGATEWAY_TEST
    -Itests/_support
lib_extra_dirs = ${PROJECT_DIR}/../../Libraries
lib_deps =
    SimGateway
    HIDControls

[env:test_hid_parser]
extends = env_base
build_src_filter = -<*> +<hid_parser/hid_parser.cpp>

[env:test_parser_resync]
extends = env_base
build_src_filter = -<*> +<parser_resync/parser_resync.cpp>

[env:test_hid_dispatch]
extends = env_base
build_src_filter = -<*> +<hid_dispatch/hid_dispatch.cpp>

[env:test_cdc_forwarding]
extends = env_base
build_src_filter = -<*> +<cdc_forwarding/cdc_forwarding.cpp>

[env:test_uart_loopback]
extends = env_base
build_src_filter = -<*> +<uart_loopback/uart_loopback.cpp>

[env:test_led_state]
extends = env_base
build_src_filter = -<*> +<led_state/led_state.cpp>

; Production-mode build: no SIMGATEWAY_TEST, real TinyUSB HID stack.
; Flash this env and open joy.cpl / DCS Controls to verify axis/button/hat layout.
; Adafruit_TinyUSB is bundled with framework-arduinopico but PlatformIO LDF ignores
; framework libraries. Force the include path directly so SimGateway.cpp can find it.
; -DUSE_TINYUSB selects the TinyUSB USB stack (equivalent to Arduino IDE Tools→USB Stack→Adafruit TinyUSB).
[env:test_hid_enumeration]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico
board_build.core = earlephilhower
framework = arduino
build_flags =
    -DUSE_TINYUSB
    -I${sysenv.HOME}/.platformio/packages/framework-arduinopico/libraries/Adafruit_TinyUSB_Arduino/src
lib_extra_dirs = ${PROJECT_DIR}/../../Libraries
lib_deps =
    SimGateway
    HIDControls
build_src_filter = -<*> +<hid_enumeration/hid_enumeration.cpp>

; Stress test: oversized descriptor (16 axes, 256 buttons, 8 hats), no SimGateway library.
; Purpose: probe what Mac/browser, Windows joy.cpl, and DCS each surface.
; No lib_deps — sketch uses only Arduino.h + Adafruit_TinyUSB.h directly.
; PID 0x4135 (vs 0x4134 for production) avoids OS device-cache conflicts.
[env:test_hid_stress]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico
board_build.core = earlephilhower
framework = arduino
build_flags =
    -DUSE_TINYUSB
    ; NOTE: do NOT -D CFG_TUD_HID_EP_BUFSIZE here — the vendor tusb_config_rp2040.h
    ; redefines it unconditionally (to 64), so a -D both warns ("redefined") and is
    ; ineffective. The 52-byte stress report fits the 64-byte default; a >64 report
    ; needs the value bumped in tusb_config_rp2040.h itself (see hid_stress.cpp).
    -I${sysenv.HOME}/.platformio/packages/framework-arduinopico/libraries/Adafruit_TinyUSB_Arduino/src
build_src_filter = -<*> +<hid_stress/hid_stress.cpp>
