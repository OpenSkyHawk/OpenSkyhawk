[platformio]
src_dir = tests

[env_base]
platform = ststm32
board = genericSTM32F103C8
framework = arduino
build_flags =
    -DNODE_ID=1
    -DHAL_CAN_MODULE_ENABLED
    -DUSB_NONE
    -DHSE_VALUE=8000000
lib_extra_dirs = ${PROJECT_DIR}/../../Libraries
lib_deps =
    STM32Board
    CANProtocol
upload_protocol = stlink
upload_flags =
    -c
    set CPUTAPID 0
monitor_speed = 115200

[env:test_led_state_machine]
extends = env_base
build_src_filter = -<*> +<led_state_machine/led_state_machine.cpp>

[env:test_diag_serial]
extends = env_base
build_src_filter = -<*> +<diag_serial/diag_serial.cpp>

[env:test_can_status_wiring]
extends = env_base
build_src_filter = -<*> +<can_status_wiring/can_status_wiring.cpp>

; ── Derived-state engine tests (#93) — STM32BOARD_TEST exposes LedState + currentState() ──

[env:test_state_precedence]
extends = env_base
build_flags = ${env_base.build_flags} -DSTM32BOARD_TEST
build_src_filter = -<*> +<state_precedence/state_precedence.cpp>

[env:test_link_decay]
extends = env_base
build_flags = ${env_base.build_flags} -DSTM32BOARD_TEST
build_src_filter = -<*> +<link_decay/link_decay.cpp>

[env:test_warning_clear]
extends = env_base
build_flags = ${env_base.build_flags} -DSTM32BOARD_TEST
build_src_filter = -<*> +<warning_clear/warning_clear.cpp>

[env:test_animation_timing]
extends = env_base
build_flags = ${env_base.build_flags} -DSTM32BOARD_TEST
build_src_filter = -<*> +<animation_timing/animation_timing.cpp>
