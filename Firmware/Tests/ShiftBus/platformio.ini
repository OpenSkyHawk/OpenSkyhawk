; ShiftBus test project — logic tests (chip-less, SHIFTBUS_TEST bypass) + bench sketches
; for the #197/#133 combined gates. See Firmware/ScratchPad/TechSpec/PanelGroup/Helpers/ShiftBus.md.

[platformio]
src_dir = tests

[env_base]
platform = ststm32
board = genericSTM32F103CB
framework = arduino
build_flags =
    -DNODE_ID=1
    -DHAL_CAN_MODULE_ENABLED
upload_protocol = stlink
upload_flags =
    -c
    set CPUTAPID 0
monitor_speed = 115200
lib_deps =
    file://../../Libraries/PanelGroup
    file://../../Libraries/CANProtocol
    file://../../Libraries/NodeStatus
    file://../../Libraries/STM32Board
    file://../../Libraries/HIDControls
    blemasle/MCP23017@^2.0.0
    adafruit/Adafruit ADS1X15@^2.0.0

; ── Logic tests — no shift-register hardware needed (SHIFTBUS_TEST bypass) ──────

[env:test_frame_map]
extends = env_base
build_flags = ${env_base.build_flags} -DSHIFTBUS_TEST
build_src_filter = -<*> +<frame_map/frame_map.cpp>

[env:test_encoder_srpins]
extends = env_base
build_flags = ${env_base.build_flags} -DSHIFTBUS_TEST -DROTARYENCODER_TEST
build_src_filter = -<*> +<encoder_srpins/encoder_srpins.cpp>

[env:test_isr_pending]
extends = env_base
build_flags = ${env_base.build_flags} -DSHIFTBUS_TEST -DROTARYENCODER_TEST -DSHIFTBUS_ISR_HZ=1000
build_src_filter = -<*> +<isr_pending/isr_pending.cpp>

[env:test_mixed_node]
extends = env_base
build_flags = ${env_base.build_flags} -DSHIFTBUS_TEST
build_src_filter = -<*> +<mixed_node/mixed_node.cpp>

; ── Bench sketches — real 74HC165/74HC595 chips on the standard pins ────────────
; SCK=PB3 MISO=PB4 MOSI=PB5 LOAD=PB8 LATCH=PB9 (one header run PB9..PB3 with I2C1).

[env:bench_gate1_multipos]
extends = env_base
build_src_filter = -<*> +<bench_gate1_multipos/bench_gate1_multipos.cpp>

[env:bench_gate23_output]
extends = env_base
build_src_filter = -<*> +<bench_gate23_output/bench_gate23_output.cpp>

[env:bench_gate6_encoder]
extends = env_base
build_flags = ${env_base.build_flags} -DROTARYENCODER_TEST
build_src_filter = -<*> +<bench_gate6_encoder/bench_gate6_encoder.cpp>

[env:bench_gate6_encoder_isr]
extends = env_base
build_flags = ${env_base.build_flags} -DROTARYENCODER_TEST -DSHIFTBUS_ISR_HZ=1000
build_src_filter = -<*> +<bench_gate6_encoder/bench_gate6_encoder.cpp>

[env:bench_probe595]
extends = env_base
build_src_filter = -<*> +<bench_probe595/bench_probe595.cpp>

[env:bench_gate5_shared]
extends = env_base
build_flags = ${env_base.build_flags} -DROTARYENCODER_TEST -DSHIFTBUS_ISR_HZ=1000
build_src_filter = -<*> +<bench_gate5_shared/bench_gate5_shared.cpp>

[env:test_mixed_isr]
extends = env_base
build_flags = ${env_base.build_flags} -DSHIFTBUS_TEST -DROTARYENCODER_TEST -DSHIFTBUS_ISR_HZ=1000
build_src_filter = -<*> +<mixed_isr/mixed_isr.cpp>

[env:bench_probe165]
extends = env_base
build_src_filter = -<*> +<bench_probe165/bench_probe165.cpp>
