[platformio]
src_dir = tests

[env_base]
platform = ststm32
board = genericSTM32F103C8
framework = arduino
build_flags =
    -DNODE_ID=1
    -DHAL_CAN_MODULE_ENABLED
    -DANALOGINPUT_TEST
upload_protocol = stlink
upload_flags =
    -c
    set CPUTAPID 0
monitor_speed = 115200
lib_deps =
    file://../../Libraries/PanelGroup
    file://../../Libraries/CANProtocol
    file://../../Libraries/STM32Board
    file://../../Libraries/HIDControls
    blemasle/MCP23017@^2.0.0
    adafruit/Adafruit ADS1X15@^2.0.0

[env:test_scale_clamp]
extends = env_base
build_src_filter = -<*> +<scale_clamp/scale_clamp.cpp>

[env:test_reverse]
extends = env_base
build_src_filter = -<*> +<reverse/reverse.cpp>

[env:test_hysteresis]
extends = env_base
build_src_filter = -<*> +<hysteresis/hysteresis.cpp>

[env:test_ewma]
extends = env_base
build_src_filter = -<*> +<ewma/ewma.cpp>

[env:test_near_rail]
extends = env_base
build_src_filter = -<*> +<near_rail/near_rail.cpp>

[env:test_force_report]
extends = env_base
build_src_filter = -<*> +<force_report/force_report.cpp>

[env:test_shift_bounds]
extends = env_base
build_src_filter = -<*> +<shift_bounds/shift_bounds.cpp>
