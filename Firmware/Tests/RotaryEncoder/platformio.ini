[platformio]
src_dir = tests

[env_base]
platform = ststm32
board = genericSTM32F103C8
framework = arduino
build_flags =
    -DNODE_ID=1
    -DHAL_CAN_MODULE_ENABLED
    -DROTARYENCODER_TEST
upload_protocol = stlink
upload_flags =
    -c
    set CPUTAPID 0
monitor_speed = 115200
lib_deps =
    file://../../Libraries/PanelGroup
    file://../../Libraries/CANProtocol
    file://../../Libraries/STM32Board
    file://../../Libraries/HIDControls
    blemasle/MCP23017@^2.0.0
    adafruit/Adafruit ADS1X15@^2.0.0

[env:test_cw_detent]
extends = env_base
build_src_filter = -<*> +<cw_detent/cw_detent.cpp>

[env:test_ccw_detent]
extends = env_base
build_src_filter = -<*> +<ccw_detent/ccw_detent.cpp>

[env:test_steps_per_detent]
extends = env_base
build_src_filter = -<*> +<steps_per_detent/steps_per_detent.cpp>

[env:test_partial_no_emit]
extends = env_base
build_src_filter = -<*> +<partial_no_emit/partial_no_emit.cpp>

[env:test_bounce]
extends = env_base
build_src_filter = -<*> +<bounce/bounce.cpp>

[env:test_reversal]
extends = env_base
build_src_filter = -<*> +<reversal/reversal.cpp>

[env:test_force_report_noop]
extends = env_base
build_src_filter = -<*> +<force_report_noop/force_report_noop.cpp>
