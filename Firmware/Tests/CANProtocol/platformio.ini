[platformio]
src_dir = tests

[env_base]
platform = ststm32
board = genericSTM32F103C8
framework = arduino
build_flags =
    -DNODE_ID=1
    -DHAL_CAN_MODULE_ENABLED
    -DUSB_NONE
    -DHSE_VALUE=8000000
lib_extra_dirs = ${PROJECT_DIR}/../../Libraries
lib_deps =
    STM32Board
    CANProtocol
upload_protocol = stlink
upload_flags =
    -c
    set CPUTAPID 0
monitor_speed = 115200

[env:test_protocol_layout]
extends = env_base
build_src_filter = -<*> +<protocol_layout/protocol_layout.cpp>

[env:test_loopback_filter]
extends = env_base
build_src_filter = -<*> +<loopback_filter/loopback_filter.cpp>

[env:test_rx_dispatch]
extends = env_base
build_src_filter = -<*> +<rx_dispatch/rx_dispatch.cpp>

[env:test_tx_batching]
extends = env_base
build_src_filter = -<*> +<tx_batching/tx_batching.cpp>

[env:test_tx_queue]
extends = env_base
build_src_filter = -<*> +<tx_queue/tx_queue.cpp>

[env:test_status_callbacks]
extends = env_base
build_src_filter = -<*> +<status_callbacks/status_callbacks.cpp>

[env:test_heartbeat_payload]
extends = env_base
build_src_filter = -<*> +<heartbeat_payload/heartbeat_payload.cpp>

; ── Dual-board integration tests (physical CAN bus required) ──────────────────
; Flash sender/tester env to Board A, receiver/ack env to Board B.
; Open DiagSerial (115200) on both boards to read results.

[env:test_dual_coalesce_sender]
extends = env_base
build_flags =
    -DNODE_ID=0
    -DHAL_CAN_MODULE_ENABLED
    -DUSB_NONE
    -DHSE_VALUE=8000000
build_src_filter = -<*> +<dual_coalesce/dual_coalesce.cpp>

[env:test_dual_coalesce_receiver]
extends = env_base
build_src_filter = -<*> +<dual_coalesce/dual_coalesce.cpp>

[env:test_dual_overflow_tester]
extends = env_base
build_flags =
    -DNODE_ID=0
    -DHAL_CAN_MODULE_ENABLED
    -DUSB_NONE
    -DHSE_VALUE=8000000
build_src_filter = -<*> +<dual_overflow/dual_overflow.cpp>

[env:test_dual_overflow_ack]
extends = env_base
build_src_filter = -<*> +<dual_overflow/dual_overflow.cpp>

[env:test_dual_bidir_node0]
extends = env_base
build_flags =
    -DNODE_ID=0
    -DHAL_CAN_MODULE_ENABLED
    -DUSB_NONE
    -DHSE_VALUE=8000000
build_src_filter = -<*> +<dual_bidir/dual_bidir.cpp>

[env:test_dual_bidir_node1]
extends = env_base
build_src_filter = -<*> +<dual_bidir/dual_bidir.cpp>
