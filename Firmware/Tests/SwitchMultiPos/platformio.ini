[platformio]
src_dir = tests

[env_base]
platform = ststm32
board = genericSTM32F103C8
framework = arduino
build_flags =
    -DNODE_ID=1
    -DHAL_CAN_MODULE_ENABLED
upload_protocol = stlink
upload_flags =
    -c
    set CPUTAPID 0
monitor_speed = 115200
lib_deps =
    file://../../Libraries/PanelGroup
    file://../../Libraries/CANProtocol
    file://../../Libraries/STM32Board
    file://../../Libraries/HIDControls
    blemasle/MCP23017@^2.0.0
    adafruit/Adafruit ADS1X15@^2.0.0

[env:test_configure]
extends = env_base
build_src_filter = -<*> +<configure/configure.cpp>

[env:test_force_report]
extends = env_base
build_src_filter = -<*> +<force_report/force_report.cpp>

[env:test_one_hot]
extends = env_base
build_src_filter = -<*> +<one_hot/one_hot.cpp>

[env:test_hold_last]
extends = env_base
build_src_filter = -<*> +<hold_last/hold_last.cpp>

[env:test_pin_nc]
extends = env_base
build_src_filter = -<*> +<pin_nc/pin_nc.cpp>

[env:test_reverse]
extends = env_base
build_src_filter = -<*> +<reverse/reverse.cpp>

[env:test_debounce]
extends = env_base
build_src_filter = -<*> +<debounce/debounce.cpp>

[env:test_no_duplicate_evt]
extends = env_base
build_src_filter = -<*> +<no_duplicate_evt/no_duplicate_evt.cpp>

[env:test_jump]
extends = env_base
build_src_filter = -<*> +<jump/jump.cpp>

[env:test_fast_sweep]
extends = env_base
build_src_filter = -<*> +<fast_sweep/fast_sweep.cpp>
