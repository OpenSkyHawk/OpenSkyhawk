[platformio]
src_dir = tests

[env_base]
platform = ststm32
board = genericSTM32F103C8
framework = arduino
build_flags =
    -DNODE_ID=1
    -DHAL_CAN_MODULE_ENABLED
    -DSTEPPERMOTOR_TEST
upload_protocol = stlink
upload_flags =
    -c
    set CPUTAPID 0
monitor_speed = 115200
lib_deps =
    file://../../Libraries/PanelGroup
    file://../../Libraries/CANProtocol
    file://../../Libraries/STM32Board
    file://../../Libraries/HIDControls
    blemasle/MCP23017@^2.0.0
    adafruit/Adafruit ADS1X15@^2.0.0

; ── deterministic, no hardware (CI) ────────────────────────────────────────────
[env:motion_profile]
extends = env_base
build_src_filter = -<*> +<motion_profile/motion_profile.cpp>

[env:home_stall]
extends = env_base
build_src_filter = -<*> +<home_stall/home_stall.cpp>

[env:home_sensor]
extends = env_base
build_src_filter = -<*> +<home_sensor/home_sensor.cpp>

[env:deadband]
extends = env_base
build_src_filter = -<*> +<deadband/deadband.cpp>

[env:wrap]
extends = env_base
build_src_filter = -<*> +<wrap/wrap.cpp>

[env:step_pattern]
extends = env_base
build_src_filter = -<*> +<step_pattern/step_pattern.cpp>

; ── on-hardware bench scenarios (flash + eyeball / drive a real motor) ──────────
[env:bringup]
extends = env_base
build_src_filter = -<*> +<bringup/bringup.cpp>

[env:mcp23017]
extends = env_base
build_src_filter = -<*> +<mcp23017/mcp23017.cpp>

[env:cal_steps_per_rev]
extends = env_base
build_src_filter = -<*> +<cal_steps_per_rev/cal_steps_per_rev.cpp>

[env:motor_compat]
extends = env_base
build_src_filter = -<*> +<motor_compat/motor_compat.cpp>

[env:accuracy_sweep]
extends = env_base
build_src_filter = -<*> +<accuracy_sweep/accuracy_sweep.cpp>

; ── BKA-30 stop-to-stop range measurement (bench, raw drive) ────────────────────
[env:cal_range]
extends = env_base
build_src_filter = -<*> +<cal_range/cal_range.cpp>
lib_deps =                              ; bare sketch — drop env_base libs (Adafruit BusIO/SPI snag)
