; OpenSkyhawk — DrumDisplay OLED output tests (issue #113)
;
; Mirrors Firmware/Tests/LED: src_dir=tests, [env_base], one build_src_filter per scenario.
; Adds the U8g2 + A4EC deps and -DDRUMDISPLAY_TEST (exposes the debug* accessors on DrumDisplay).
; All scenarios compile on genericSTM32F103C8 (CI gate); flash the bluepill_f103c8 env to a real
; SH1106 to drive the readouts by hand.
;   build:  ~/.platformio/penv/bin/pio run -d Firmware/Tests/DrumDisplay
;   upload: ~/.platformio/penv/bin/pio run -d Firmware/Tests/DrumDisplay -e bluepill_f103c8 -t upload

[platformio]
src_dir = tests

[env_base]
platform = ststm32
board = genericSTM32F103C8
framework = arduino
build_flags =
    -DNODE_ID=1
    -DHAL_CAN_MODULE_ENABLED
    -DDRUMDISPLAY_TEST
upload_protocol = stlink
upload_flags =
    -c
    set CPUTAPID 0
monitor_speed = 115200
lib_deps =
    file://../../Libraries/PanelGroup
    file://../../Libraries/DrumDisplay
    file://../../Libraries/CANProtocol
    file://../../Libraries/STM32Board
    file://../../Libraries/HIDControls
    file://../../Libraries/A4EC
    blemasle/MCP23017@^2.0.0
    adafruit/Adafruit ADS1X15@^2.0.0
    olikraus/U8g2@^2.35

; bringup + roll_reference are standalone U8g2 renderer references (no OpenSkyhawk libs) —
; override lib_deps to U8g2 only, matching the original prototype platformio.ini.
[env:bringup]
extends = env_base
lib_deps = olikraus/U8g2@^2.35
build_src_filter = -<*> +<bringup/bringup.cpp>

[env:roll_reference]
extends = env_base
lib_deps = olikraus/U8g2@^2.35
build_src_filter = -<*> +<roll_reference/roll_reference.cpp>

[env:speed]
extends = env_base
build_src_filter = -<*> +<speed/speed.cpp>

[env:nav_pos]
extends = env_base
build_src_filter = -<*> +<nav_pos/nav_pos.cpp>

[env:magvar]
extends = env_base
build_src_filter = -<*> +<magvar/magvar.cpp>

[env:grouped_decimal]
extends = env_base
build_src_filter = -<*> +<grouped_decimal/grouped_decimal.cpp>

[env:arc51_manual]
extends = env_base
build_src_filter = -<*> +<arc51_manual/arc51_manual.cpp>

[env:bdhi]
extends = env_base
build_src_filter = -<*> +<bdhi/bdhi.cpp>

[env:font]
extends = env_base
build_src_filter = -<*> +<font/font.cpp>

[env:mux]
extends = env_base
build_src_filter = -<*> +<mux/mux.cpp>

; ── hands-on bench env (run on a real SH1106) — board + single scenario override ──
[env:bluepill_f103c8]
extends = env_base
board = bluepill_f103c8
build_src_filter = -<*> +<speed/speed.cpp>
