[platformio]
src_dir = tests

[env_base]
platform = ststm32
board = genericSTM32F103CB
framework = arduino
build_flags =
    -DNODE_ID=0
    -DHAL_CAN_MODULE_ENABLED
    -DUSB_NONE
    -DHSE_VALUE=8000000
    -DSERIAL_RX_BUFFER_SIZE=256
lib_extra_dirs = ${PROJECT_DIR}/../../Libraries
lib_deps =
    PanelBridge
    CANProtocol
    STM32Board
    A4EC
    HIDControls
    dcs-skunkworks/DCS-BIOS
upload_protocol = stlink
monitor_speed = 115200

; Setup order, pass-all filter, CAN start, cold-boot SYNC_REQ.
; Single board. STLink required for flash; DiagSerial (USART1) for output.
[env:test_startup_sequence]
extends = env_base
build_src_filter = -<*> +<startup_sequence/startup_sequence.cpp>

; READY sync, alive/dead callbacks, heartbeat timeout/recovery.
; Requires two boards (NODE_ID=0 and NODE_ID=1) on a physical CAN bus.
[env:test_node_tracking_bridge]
extends = env_base
build_flags =
    -DNODE_ID=0
    -DHAL_CAN_MODULE_ENABLED
    -DUSB_NONE
    -DHSE_VALUE=8000000
    -DSERIAL_RX_BUFFER_SIZE=256
build_src_filter = -<*> +<node_tracking/node_tracking.cpp>

[env:test_node_tracking_node]
extends = env_base
build_flags =
    -DNODE_ID=1
    -DHAL_CAN_MODULE_ENABLED
    -DUSB_NONE
    -DHSE_VALUE=8000000
build_src_filter = -<*> +<node_tracking/node_tracking.cpp>

; EVT routing: 0x8000-0x86FF → DCS-BIOS ASCII on Serial; 0x8700 and 0xFFFF rejected.
; Single board. Uses PANELBRIDGE_TEST hooks — no CAN bus required.
; Serial (UART2 PA2/PA3) → USB-UART adapter → PC terminal at 250000 baud.
; DiagSerial (USART1 PA9/PA10) reports pass/fail at 115200 baud.
[env:test_input_dispatch_dcs]
extends = env_base
build_flags =
    -DNODE_ID=0
    -DHAL_CAN_MODULE_ENABLED
    -DUSB_NONE
    -DHSE_VALUE=8000000
    -DSERIAL_RX_BUFFER_SIZE=256
    -DPANELBRIDGE_TEST
build_src_filter = -<*> +<input_dispatch_dcs/input_dispatch_dcs.cpp>

; EVT routing: controlId < 0x8000 → 6-byte HID frame (0xAA 0x55 ...) on Serial.
; Single board. Uses PANELBRIDGE_TEST hooks — no CAN bus required.
; Serial (UART2 PA2/PA3) → USB-UART adapter → PC terminal at 250000 baud.
[env:test_input_dispatch_hid]
extends = env_base
build_flags =
    -DNODE_ID=0
    -DHAL_CAN_MODULE_ENABLED
    -DUSB_NONE
    -DHSE_VALUE=8000000
    -DSERIAL_RX_BUFFER_SIZE=256
    -DPANELBRIDGE_TEST
build_src_filter = -<*> +<input_dispatch_hid/input_dispatch_hid.cpp>

; DCS-BIOS export listener: address 0x8000-0x86FF → CANProtocol::sendBatched() → CTRL_BCAST.
; Single board. Uses PANELBRIDGE_TEST hook testHandleExport() — no DCS or live serial required.
[env:test_output_submission]
extends = env_base
build_flags =
    -DNODE_ID=0
    -DHAL_CAN_MODULE_ENABLED
    -DUSB_NONE
    -DHSE_VALUE=8000000
    -DSERIAL_RX_BUFFER_SIZE=256
    -DPANELBRIDGE_TEST
build_src_filter = -<*> +<output_submission/output_submission.cpp>

; DCS session change: first model-time value seeds state; later decrease broadcasts SYNC_REQ.
; Single board. Observes SYNC_REQ logged on DiagSerial.
[env:test_model_time_resync]
extends = env_base
build_flags =
    -DNODE_ID=0
    -DHAL_CAN_MODULE_ENABLED
    -DUSB_NONE
    -DHSE_VALUE=8000000
    -DSERIAL_RX_BUFFER_SIZE=256
build_src_filter = -<*> +<model_time_resync/model_time_resync.cpp>

; DiagSerial 'T' character → TEST_SEQ CAN frame; ECHO from sub-node → RTT logged.
; Requires two boards on a physical CAN bus.
[env:test_seq_diag_bridge]
extends = env_base
build_flags =
    -DNODE_ID=0
    -DHAL_CAN_MODULE_ENABLED
    -DUSB_NONE
    -DHSE_VALUE=8000000
    -DSERIAL_RX_BUFFER_SIZE=256
build_src_filter = -<*> +<test_seq_diag/test_seq_diag.cpp>

[env:test_seq_diag_node]
extends = env_base
build_flags =
    -DNODE_ID=1
    -DHAL_CAN_MODULE_ENABLED
    -DUSB_NONE
    -DHSE_VALUE=8000000
build_src_filter = -<*> +<test_seq_diag/test_seq_diag.cpp>

; Full startup/reconnect lifecycle on a physical CAN bus with two boards.
; NODE_ID=0: PanelBridge role. NODE_ID=1: PanelGroup role. See test file for test procedure.
[env:test_dual_integration_bridge]
extends = env_base
build_flags =
    -DNODE_ID=0
    -DHAL_CAN_MODULE_ENABLED
    -DUSB_NONE
    -DHSE_VALUE=8000000
    -DSERIAL_RX_BUFFER_SIZE=256
build_src_filter = -<*> +<dual_integration/dual_integration.cpp>

[env:test_dual_integration_node]
extends = env_base
build_flags =
    -DNODE_ID=1
    -DHAL_CAN_MODULE_ENABLED
    -DUSB_NONE
    -DHSE_VALUE=8000000
build_src_filter = -<*> +<dual_integration/dual_integration.cpp>
