[env:PanelBridge]
platform = ststm32
board = genericSTM32F103CB
framework = arduino
board_build.f_cpu = 72000000L

; Serial = UART2 (PA2/PA3) → SimGateway @ 250000 baud.
; No USB CDC — USB pins (PA11/PA12) are shared with CAN and used for CAN only.
build_flags =
    -DNODE_ID=0
    -DSERIAL_RX_BUFFER_SIZE=256
    -DHAL_CAN_MODULE_ENABLED
    -DUSB_NONE
    -DHSE_VALUE=8000000

; When copied to Firmware/<PanelName>/, change ../../Libraries → ../Libraries
lib_extra_dirs = ${PROJECT_DIR}/../../Libraries
lib_deps =
    HIDControls
    STM32Board
    PanelBridge
    CANProtocol
    A4EC
    dcs-skunkworks/DCS-BIOS

upload_protocol = stlink
; Some STM32F103CB clones require the CPUTAPID override below.
; Uncomment if ST-Link reports "tap not found" during flashing:
; upload_flags =
;     -c
;     set CPUTAPID 0x2ba01477
monitor_speed = 115200
