[env:SimGateway]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
; Change board to match your module: rpipico, rpipico2, waveshare_rp2040_zero, etc.
board = rpipico
framework = arduino
upload_protocol = picotool

; When copied to Firmware/<Name>/, change ../../Libraries → ../Libraries
lib_extra_dirs = ${PROJECT_DIR}/../../Libraries
lib_deps =
    HIDControls
    SimGateway
    adafruit/Adafruit TinyUSB Library

monitor_speed = 250000
