[env:PanelGroup]
platform = ststm32
board = genericSTM32F103CB
framework = arduino
board_build.f_cpu = 72000000L

; NODE_ID must be set here — not in src/main.cpp.
; A #define in main.cpp is invisible to library translation units (CANProtocol, PanelGroup).
; Valid range: 1–63. Each board in the cockpit must have a unique value.
build_flags =
    -DNODE_ID=1
    -DHAL_CAN_MODULE_ENABLED
    -DUSB_NONE
    -DHSE_VALUE=8000000

; -DHSE_VALUE=8000000: explicit 8 MHz external crystal — required for reliable CAN bit-rate
; lock. Internal RC oscillator is not accurate enough for 500 kbps CAN timing.

; When copied to Firmware/<PanelName>/, change ../../Libraries → ../Libraries
lib_extra_dirs = ${PROJECT_DIR}/../../Libraries
lib_deps =
    HIDControls
    STM32Board
    PanelGroup
    CANProtocol
    A4EC

upload_protocol = stlink
; Some STM32F103CB clones require the CPUTAPID override below.
; Uncomment if ST-Link reports "tap not found" during flashing:
; upload_flags =
;     -c
;     set CPUTAPID 0x2ba01477
monitor_speed = 115200
; monitor_port = /dev/cu.usbserial-XXXX   ; set to your USB-serial adapter port
