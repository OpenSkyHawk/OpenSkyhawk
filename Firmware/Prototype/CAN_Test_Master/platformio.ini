[env:CAN_Test_Master]
platform = ststm32
board = genericSTM32F103CB
framework = arduino
board_build.f_cpu = 72000000L
; Serial maps to UART2 (PA2/PA3) — no CDC flag, no serial remap
build_flags =
    -DSERIAL_RX_BUFFER_SIZE=256
    -DHAL_CAN_MODULE_ENABLED
lib_extra_dirs = ${PROJECT_DIR}/../../Libraries
; CAN is driven via HAL_CAN from the framework — no external library needed
upload_protocol = stlink
upload_flags =
    -c
    set CPUTAPID 0x2ba01477
debug_extra_cmds =
    set CPUTAPID 0x2ba01477
