[env:E2E_SimGateway]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
; Change board to match your module: rpipico, rpipico2, waveshare_rp2040_zero, etc.
board = rpipico
board_build.core = earlephilhower
framework = arduino
upload_protocol = picotool
; -DUSE_TINYUSB selects the TinyUSB USB stack (replaces default Pico stack).
; Required for Adafruit_TinyUSB.h and the HID backend in SimGateway.cpp.
build_flags = -DUSE_TINYUSB

lib_extra_dirs = ${PROJECT_DIR}/../../../Libraries
lib_deps =
    HIDControls
    SimGateway
    adafruit/Adafruit TinyUSB Library

monitor_speed = 250000
