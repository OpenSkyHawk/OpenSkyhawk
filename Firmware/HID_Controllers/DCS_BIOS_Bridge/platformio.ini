[env:DCS_BIOS_Bridge]
; Tiny2040 (Pimoroni) — any RP2040 module works; change board as needed.
; Serial  = USB CDC (to PC / DCS-BIOS)
; Serial1 = UART0 on GP0 (TX) / GP1 (RX) — to STM32 PA3 / PA2
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pimoroni_tiny2040
board_build.core = earlephilhower
framework = arduino
upload_protocol = picotool
