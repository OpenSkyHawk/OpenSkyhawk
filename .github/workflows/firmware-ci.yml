name: Firmware CI

on:
  workflow_dispatch:
  schedule:
    # Weekly full build. PRs use affected-project selection for faster feedback.
    - cron: "0 8 * * 0"
  pull_request:
    paths:
      - "Firmware/**"
      - ".github/workflows/firmware-ci.yml"
      - ".github/firmware-platformio-impact.json"
      - ".github/scripts/select-platformio-projects.py"

permissions:
  contents: read

jobs:
  firmware:
    name: Build supported PlatformIO projects
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Select firmware projects
        id: select
        run: |
          set -euo pipefail

          projects_file="$RUNNER_TEMP/platformio-projects.txt"
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            python .github/scripts/select-platformio-projects.py \
              --mode affected \
              --base "${{ github.event.pull_request.base.sha }}" \
              --head "${{ github.event.pull_request.head.sha }}" \
              --output "$projects_file" \
              --github-output "$GITHUB_OUTPUT"
          else
            python .github/scripts/select-platformio-projects.py \
              --mode full \
              --output "$projects_file" \
              --github-output "$GITHUB_OUTPUT"
          fi

      - name: Cache PlatformIO packages
        if: steps.select.outputs.project_count != '0'
        uses: actions/cache@v5
        with:
          path: ~/.platformio/.cache
          key: ${{ runner.os }}-platformio-firmware-${{ hashFiles('Firmware/**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-firmware-
            ${{ runner.os }}-platformio-

      - name: Install PlatformIO
        if: steps.select.outputs.project_count != '0'
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install platformio

      - name: Build firmware projects
        if: steps.select.outputs.project_count != '0'
        run: |
          set -euo pipefail

          logs_dir="$RUNNER_TEMP/platformio-logs/firmware"
          mkdir -p "$logs_dir"
          failed=0
          found=0

          while IFS= read -r project_dir; do
            found=1
            project_ini="$project_dir/platformio.ini"
            log_file="$logs_dir/$(printf '%s' "$project_dir" | tr '/ ' '__').log"

            echo "Building $project_dir"
            if platformio run -d "$project_dir" > "$log_file" 2>&1; then
              echo "PASS $project_dir"
            else
              failed=1
              echo "::error file=$project_ini::PlatformIO build failed"
              echo "FAIL $project_dir"
              echo "::group::Last 120 lines from $project_dir"
              tail -n 120 "$log_file"
              echo "::endgroup::"
            fi
          done < "$RUNNER_TEMP/platformio-projects.txt"

          if [ "$found" -eq 0 ]; then
            echo "No PlatformIO projects were selected." >&2
            exit 1
          fi

          exit "$failed"

      - name: Skip firmware builds
        if: steps.select.outputs.project_count == '0'
        run: echo "No affected PlatformIO projects were selected."

      - name: Upload PlatformIO logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: firmware-platformio-logs
          path: ${{ runner.temp }}/platformio-logs
          if-no-files-found: ignore
          retention-days: 7
