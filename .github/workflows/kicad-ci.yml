name: KiCad PR Reports

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "PCB/**/*.kicad_pro"
      - "PCB/**/*.kicad_sch"
      - "PCB/**/*.kicad_pcb"
      - "PCB/**/*.kicad_dru"
      - "PCB/**/sym-lib-table"
      - "PCB/**/fp-lib-table"
      - "PCB/Libraries/**"
      - ".github/workflows/kicad-ci.yml"

permissions:
  contents: read

jobs:
  kicad:
    name: Generate ERC/DRC reports
    runs-on: ubuntu-latest
    container:
      image: kicad/kicad:10.0.1

    steps:
      - name: Fix runner temp permissions
        run: chmod -R 777 "$RUNNER_TEMP"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run KiCad checks for changed projects
        run: |
          set -euo pipefail

          KICAD=kicad-cli
          reports_dir="$RUNNER_TEMP/kicad-reports"
          changed_file="$RUNNER_TEMP/kicad-changed-files.txt"
          projects_file="$RUNNER_TEMP/kicad-projects.txt"
          mkdir -p "$reports_dir"

          git fetch origin "${{ github.base_ref || 'main' }}" --depth=1
          git diff --name-only "origin/${{ github.base_ref || 'main' }}...HEAD" -- PCB |
            grep -E '(\.kicad_(pro|sch|pcb|dru)$|/(sym-lib-table|fp-lib-table)$|^PCB/Libraries/)' |
            grep -v '/\.history/' > "$changed_file" || true

          if [ ! -s "$changed_file" ]; then
            echo "No changed KiCad files found."
            exit 0
          fi

          : > "$projects_file"
          if grep -Eq '^PCB/Libraries/' "$changed_file"; then
            find PCB -name '*.kicad_pro' \
              -not -path 'PCB/Libraries/*' \
              -not -path '*/.history/*' \
              -exec dirname {} \; >> "$projects_file"
          fi

          while IFS= read -r path; do
            dir="$(dirname "$path")"
            while [ "$dir" != "." ] && [ "$dir" != "/" ]; do
              if ls "$dir"/*.kicad_pro >/dev/null 2>&1; then
                echo "$dir" >> "$projects_file"
                break
              fi
              dir="$(dirname "$dir")"
            done
          done < "$changed_file"

          sort -u "$projects_file" -o "$projects_file"

          if [ ! -s "$projects_file" ]; then
            echo "Changed KiCad files do not belong to a concrete board project."
            exit 0
          fi

          failed=0
          while IFS= read -r project_dir; do
            project_name="$(basename "$project_dir")"
            root_sch="$project_dir/$project_name.kicad_sch"
            board="$project_dir/$project_name.kicad_pcb"

            echo "Checking $project_dir"

            if [ -f "$root_sch" ]; then
              erc_report="$reports_dir/${project_name}-erc.json"
              if "$KICAD" sch erc --output "$erc_report" "$root_sch"; then
                echo "PASS ERC $root_sch"
              else
                failed=1
                echo "::error file=$root_sch::KiCad ERC reported issues"
              fi
            fi

            if [ -f "$board" ]; then
              drc_report="$reports_dir/${project_name}-drc.json"
              if "$KICAD" pcb drc --output "$drc_report" "$board"; then
                echo "PASS DRC $board"
              else
                failed=1
                echo "::error file=$board::KiCad DRC reported issues"
              fi
            fi
          done < "$projects_file"

          exit "$failed"

      - name: Upload KiCad reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kicad-reports
          path: ${{ runner.temp }}/kicad-reports
          if-no-files-found: ignore
          retention-days: 14
