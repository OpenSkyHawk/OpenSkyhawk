name: Docs Drift Reminder

# Early nudge: when a PR touches a file the docs site is built from, post a
# sticky comment reminding the author to keep the published pages in sync.
# This is the interactive complement to the weekly docs-drift review
# (tools/docs-drift/REVIEW.md). No AI, no secrets — just a path filter.

on:
  pull_request:
    paths:
      - "docs/_source/**"
      - "CLAUDE.md"
      - "Firmware/Panels/**"
      - "Firmware/NODE_IDS.md"
      - "PCB/**"
      - "CAD/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  remind:
    name: Flag possible docs impact
    runs-on: ubuntu-latest
    steps:
      - name: Post or update reminder comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- docs-drift-reminder -->';
            const body = [
              marker,
              '### 📝 Docs site may need an update',
              '',
              'This PR touches files the docs site is built from. Before merging,',
              'confirm the published pages still match:',
              '',
              '- [ ] New hardware (panel / PCB / CAD) has a matching page under `docs/`',
              '- [ ] Changed design decisions are reflected on the relevant page',
              '      (e.g. `architecture/design-decisions.md`, the hardware reference)',
              '- [ ] No page now contradicts `docs/_source/` or `hardware-standards.md`',
              '- [ ] Structured tables (NODE_IDs, pinouts) are transcluded, not retyped',
              '',
              '_Backstop: the weekly docs-drift review. Ignore `docs/api/` (auto-generated)._',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(
              (c) => c.body && c.body.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }
