<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 900" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <style>
    .bg    { fill:#ffffff; }
    .cell  { fill:#f8fafc; stroke:#cbd5e1; stroke-width:1.5; rx:8; }
    .title { font-size:21px; font-weight:700; fill:#0f172a; }
    .sub   { font-size:13px; fill:#475569; }
    .h     { font-size:15px; font-weight:700; fill:#0f172a; }
    .lbl   { font-size:12px; fill:#1e293b; }
    .mono  { font-size:12px; fill:#334155; font-family:"SF Mono",Consolas,monospace; }
    .good  { fill:#15803d; font-size:13px; font-weight:700; }
    .bad   { fill:#b91c1c; font-size:13px; font-weight:700; }
    .cu    { fill:#f59e0b; }
    .pour  { fill:#fde68a; stroke:#d97706; stroke-width:1; }
    .gnd   { fill:#bbf7d0; stroke:#15803d; stroke-width:1; }
    .sig   { stroke:#2563eb; stroke-width:3; fill:none; }
    .cut   { fill:#ffffff; stroke:#94a3b8; stroke-width:1; }
    .note  { font-size:11.5px; fill:#64748b; }
    .arrow { stroke:#b91c1c; stroke-width:2; fill:none; marker-end:url(#ah); }
  </style>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#b91c1c"/>
    </marker>
    <pattern id="hatch" width="7" height="7" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="7" height="7" fill="#fde68a"/>
      <line x1="0" y1="0" x2="0" y2="7" stroke="#d97706" stroke-width="1"/>
    </pattern>
  </defs>

  <rect class="bg" x="0" y="0" width="1180" height="900"/>
  <text class="title" x="30" y="38">Power pour — width &amp; layout</text>
  <text class="sub"   x="30" y="58">1 oz copper, 2-layer. Bus worst case ≈ 2.3 A. Rule: 1 mm carries it all — protect the neck, don't island the pour.</text>

  <!-- ===== Cell A: width vs current ===== -->
  <rect class="cell" x="20" y="80" width="555" height="380"/>
  <text class="h" x="40" y="108">1 · How wide? Current sets it</text>
  <text class="note" x="40" y="128">IPC-2221, 1 oz, 10 °C rise, outer layer</text>

  <!-- 1mm trace -->
  <rect class="cu" x="40" y="150" width="240" height="4"/>
  <text class="mono" x="40" y="172">1.0 mm trace</text>
  <text class="lbl" x="150" y="172">= 2.3 A (whole bus)</text>

  <!-- pour block -->
  <rect x="40" y="190" width="240" height="40" fill="url(#hatch)" stroke="#d97706"/>
  <text class="mono" x="46" y="214">pour 5–20 mm</text>
  <text class="lbl" x="150" y="214" fill="#92400e">= 10–40 A · 10–40× margin</text>
  <text class="good" x="300" y="214">never the limit ✓</text>

  <!-- table -->
  <text class="h" x="40" y="266" font-size="13">width ↔ current</text>
  <text class="mono" x="40" y="288">1 A → 0.3 mm    3 A → 1.4 mm</text>
  <text class="mono" x="40" y="308">2 A → 0.8 mm    5 A → 2.8 mm</text>
  <text class="note" x="40" y="338">→ You never size the pour UP for current.</text>
  <text class="note" x="40" y="356">The Power netclass is 1.0 mm for routed stubs;</text>
  <text class="note" x="40" y="374">the pour just adds margin + low impedance.</text>
  <text class="note" x="40" y="404">20 °C rise ≈ half these widths. 2 oz ≈ half again.</text>

  <!-- ===== Cell B: necking ===== -->
  <rect class="cell" x="600" y="80" width="560" height="380"/>
  <text class="h" x="620" y="108">2 · The neck is the real limit</text>
  <text class="note" x="620" y="128">A pour is only as good as its tightest pinch</text>

  <!-- pour with via cluster choke -->
  <rect x="620" y="150" width="520" height="120" fill="url(#hatch)" stroke="#d97706"/>
  <!-- cutout + vias creating a neck -->
  <rect class="cut" x="760" y="150" width="120" height="70"/>
  <circle cx="900" cy="240" r="7" class="cut"/><circle cx="922" cy="240" r="7" class="cut"/>
  <circle cx="944" cy="240" r="7" class="cut"/>
  <path class="arrow" d="M820 300 L820 232"/>
  <text class="bad" x="700" y="318">✗ neck ≈ 0.4 mm — current funnels here, heats</text>

  <!-- good wide path -->
  <rect x="620" y="345" width="520" height="55" fill="url(#hatch)" stroke="#d97706"/>
  <rect class="cut" x="760" y="345" width="80" height="18"/>
  <text class="good" x="700" y="388">✓ keep ≥ 2 mm copper past vias / holes / cutouts</text>
  <text class="note" x="620" y="424">Check with “show filled zones” + measure the gap, not the average width.</text>

  <!-- ===== Cell C: islanding ===== -->
  <rect class="cell" x="20" y="490" width="555" height="390"/>
  <text class="h" x="40" y="518">3 · Don’t island the pour</text>
  <text class="note" x="40" y="538">a same-layer signal across the channel splits it</text>

  <!-- BAD -->
  <text class="bad" x="40" y="566">✗ signal cuts the 12 V channel</text>
  <rect class="cu" x="50" y="580" width="34" height="44"/><text class="mono" x="44" y="640">IN</text>
  <rect class="cu" x="470" y="580" width="34" height="44"/><text class="mono" x="466" y="640">OUT</text>
  <rect x="90" y="585" width="375" height="16" fill="url(#hatch)" stroke="#d97706"/>
  <rect x="90" y="603" width="375" height="16" fill="url(#hatch)" stroke="#d97706"/>
  <path class="sig" d="M270 575 L270 629"/>
  <path class="arrow" d="M330 650 L278 612"/>
  <text class="note" x="300" y="666">pour split → only the thin gap connects</text>

  <!-- GOOD -->
  <text class="good" x="40" y="710">✓ signal on bottom layer (or routed around)</text>
  <rect class="cu" x="50" y="724" width="34" height="44"/>
  <rect class="cu" x="470" y="724" width="34" height="44"/>
  <rect x="90" y="724" width="375" height="44" fill="url(#hatch)" stroke="#d97706"/>
  <path d="M270 720 L270 772" stroke="#2563eb" stroke-width="3" stroke-dasharray="5 4" fill="none"/>
  <circle cx="270" cy="746" r="5" fill="#fff" stroke="#2563eb"/>
  <text class="note" x="40" y="800">dashed = signal on the OTHER layer; pour stays continuous top.</text>
  <text class="note" x="40" y="822">GND plane on bottom stays unbroken under CAN/signals (return path).</text>

  <!-- ===== Cell D: pads + stitching ===== -->
  <rect class="cell" x="600" y="490" width="560" height="390"/>
  <text class="h" x="620" y="518">4 · Connector pads + stitching</text>
  <text class="note" x="620" y="538">how the pad ties into the pour decides everything</text>

  <!-- thermal relief BAD -->
  <text class="bad" x="630" y="572">✗ thermal relief</text>
  <rect x="630" y="585" width="120" height="90" fill="url(#hatch)" stroke="#d97706"/>
  <circle cx="690" cy="630" r="26" fill="#fff" stroke="#d97706" stroke-width="2"/>
  <circle cx="690" cy="630" r="13" class="cu"/>
  <!-- 4 thin spokes -->
  <rect x="688" y="604" width="4" height="13" class="cu"/>
  <rect x="688" y="643" width="4" height="13" class="cu"/>
  <rect x="664" y="628" width="13" height="4" class="cu"/>
  <rect x="703" y="628" width="13" height="4" class="cu"/>
  <text class="note" x="630" y="694">4 thin spokes choke the current</text>

  <!-- solid GOOD -->
  <text class="good" x="900" y="572">✓ solid (or 4× ≥0.5 mm)</text>
  <rect x="900" y="585" width="120" height="90" fill="url(#hatch)" stroke="#d97706"/>
  <circle cx="960" cy="630" r="26" class="cu"/>
  <circle cx="960" cy="630" r="11" fill="#fff" stroke="#92400e"/>
  <text class="note" x="900" y="694">pad floods straight into pour</text>
  <text class="note" x="900" y="712">(T962 reflow handles solid pads)</text>

  <!-- stitching -->
  <text class="h" x="630" y="752" font-size="13">layer change → stitch</text>
  <g>
    <circle cx="650" cy="785" r="7" class="gnd"/><circle cx="676" cy="785" r="7" class="gnd"/>
    <circle cx="702" cy="785" r="7" class="gnd"/><circle cx="650" cy="811" r="7" class="gnd"/>
    <circle cx="676" cy="811" r="7" class="gnd"/><circle cx="702" cy="811" r="7" class="gnd"/>
  </g>
  <text class="note" x="725" y="792">≥ 4–6 power vias (0.4 mm)</text>
  <text class="note" x="725" y="810">~1 A each → parallel them,</text>
  <text class="note" x="725" y="828">never a single via on a power net.</text>
</svg>
