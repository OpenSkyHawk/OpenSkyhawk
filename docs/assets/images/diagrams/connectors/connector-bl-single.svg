<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 234" font-family='"Saira", "Saira Variable", ui-sans-serif, system-ui, sans-serif'>
  <title>Backlight single-zone connector J_BL pinout</title>
  <style>
    .card  { fill:#0d1626; stroke:rgba(59,139,235,0.22); stroke-width:1.5; }
