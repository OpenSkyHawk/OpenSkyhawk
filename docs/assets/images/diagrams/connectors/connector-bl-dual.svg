    .v12   { stroke:#ef4444; } .t12 { fill:#f87171; }
    .v5    { stroke:#f4b321; } .t5  { fill:#f4b321; }
    .v33   { stroke:#4ade80; } .t33 { fill:#4ade80; }
    .gnd   { stroke:#64748b; } .tgnd { fill:#9ca8bc; }
    .sig   { stroke:#3b8beb; } .tsig { fill:#7db4f5; }
    .ret   { stroke:#a78bfa; } .tret { fill:#c4b5fd; }
  </style>
