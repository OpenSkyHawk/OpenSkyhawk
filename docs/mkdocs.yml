site_name: OpenSkyhawk
site_url: https://openskyhawk.github.io/OpenSkyhawk/
repo_url: https://github.com/OpenSkyhawk/OpenSkyhawk
repo_name: Get Involved
docs_dir: .
site_dir: ../site

theme:
  name: material
  custom_dir: overrides
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - navigation.tabs
    - navigation.top
    - search.highlight
  logo: assets/images/brand/site-logo.png

extra_css:
  - assets/css/extra.css

nav:
  - Home: index.md

  - Getting Started:
    - What is OpenSkyhawk?: getting-started/overview.md
    - How the System Works: getting-started/system-overview.md
    - What You'll Need: getting-started/prerequisites.md
    - Repo Layout: getting-started/repo-layout.md

  - Architecture:
    - Overview: architecture/index.md
    - Design Decisions: architecture/design-decisions.md
    - Firmware Tiers: architecture/firmware-tiers.md
    - CAN Bus Protocol: architecture/can-bus.md
    - SimGateway: architecture/sim-gateway.md
    - DCS-BIOS vs HID: architecture/dcsbios-vs-hid.md
    - Power Architecture: architecture/power.md

  - Hardware Reference:
    - Hardware Standards: hardware/standards.md
    - Mechanical Standards: hardware/mechanical-standards.md
    - PCB Design Rules: hardware/pcb-design-rules.md
    - KiCad Workflow: hardware/kicad-workflow.md
    - CAD Workflow: hardware/cad-workflow.md
    - 3D Printing Guide: hardware/3d-printing.md
    - Connector & Harness Guide: hardware/connectors.md
    - Component Library: hardware/components.md
    - Printed Parts Library: hardware/printed-parts.md

  - Firmware Reference:
    - Overview: firmware/index.md
    - PlatformIO Setup: firmware/platformio-setup.md
    - NODE_ID & CAN Addressing: firmware/node-id.md
    - DCS-BIOS Integration: firmware/dcsbios-integration.md
    - HID Controls: firmware/hid-controls.md
    - Control Types: firmware/control-types.md
    - Debugging on STM32: firmware/debugging.md

  - Center Console:
    - Overview: panels/center-console/index.md
    - Armament Group:
      - Overview: panels/center-console/armament/index.md

  - Left Console:
    - Overview: panels/left-console/index.md

  - Right Console:
    - Overview: panels/right-console/index.md

  - Flight Controls:
    - Overview: flight-controls/index.md

  - Kit Assembly:
    - Overview: kits/index.md
    - What's in the Box: kits/whats-in-the-box.md
    - Armament Group Kit:
      - Assembly Guide: kits/armament/assembly.md
      - Flashing Firmware: kits/armament/flashing.md
      - DCS Setup: kits/armament/dcs-setup.md
      - Testing & Troubleshooting: kits/armament/testing.md

  - Build Guides:
    - Overview: guides/index.md
    - Your First Panel: guides/first-panel.md
    - PCB Ordering (JLCPCB): guides/pcb-ordering.md
    - Assembly & Soldering: guides/assembly.md
    - Flashing Firmware: guides/flashing.md
    - Bring-Up & Testing: guides/bring-up.md
    - Adding a New Panel Group: guides/new-panel-group.md
    - Adding a New Control Type: guides/new-control-type.md

  - Contributing:
    - How to Contribute: contributing/index.md
    - Design Conventions: contributing/conventions.md
    - Docs Workflow: contributing/docs-workflow.md
    - Adding a Controller: contributing/adding-controller.md

  # DO NOT MODIFY BELOW THIS LINE — API Reference is auto-generated by mkdoxy
  - API Reference:
    - Overview: api/index.md
    - Deprecated List: api/deprecated.md
    - Namespaces:
      - Namespace List: api/namespaces.md
      - Namespace Members:
        - All: api/namespace_members.md
        - Functions: api/namespace_member_functions.md
        - Variables: api/namespace_member_variables.md
        - Typedefs: api/namespace_member_typedefs.md
        - Enums: api/namespace_member_enums.md
    - Classes:
      - Class List: api/annotated.md
      - Class Index: api/classes.md
      - Class Hierarchy: api/hierarchy.md
      - Class Members:
        - All: api/class_members.md
        - Functions: api/class_member_functions.md
        - Variables: api/class_member_variables.md
        - Typedefs: api/class_member_typedefs.md
        - Enums: api/class_member_enums.md
    - Files:
      - File List: api/files.md
      - Functions: api/functions.md
      - Variables: api/variables.md
      - Macros: api/macros.md
    - Modules: api/modules.md
    - Pages: api/pages.md

not_in_nav: |
  _source/**
  api/_*.md
  api/class_open_skyhawk_*.md
  api/dir_*.md
  api/namespace_0*.md
  api/namespace_input_type.md
  api/namespace_open_skyhawk.md
  api/namespace_panel_bridge.md
  api/namespace_panel_group.md
  api/namespace_s_t_m32_board.md
  api/namespace_sim_gateway.md
  api/struct_*.md
  api/links.md

exclude_docs: |
  mkdocs.yml
  Doxyfile
  overrides/
  assets/source-mocks/
  assets/**/*mock*.png

plugins:
  - search
  - mkdoxy:
      projects:
        api:
          src-dirs: Firmware/Libraries
          full-doc: True
          doxy-cfg:
            FILE_PATTERNS: "*.h *.cpp"
            RECURSIVE: YES
            EXCLUDE_PATTERNS: "*/library.json */README.md"
            EXTRACT_ALL: YES
            EXTRACT_PRIVATE: NO
            EXTRACT_STATIC: YES
            EXTRACT_ANON_NSPACES: NO
            ENABLE_PREPROCESSING: YES
            MACRO_EXPANSION: YES
            PREDEFINED: "ARDUINO_ARCH_STM32 ARDUINO_ARCH_RP2040"
            QUIET: YES
            WARNINGS: YES
            WARN_IF_UNDOCUMENTED: NO

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
